name: CI - API Spring Boot

# O pipeline será disparado toda vez que houver um push na branch main
# afetando arquivos dentro da pasta da api-spring
on:
  push:
    branches: [ "main" ]
    paths:
      - 'api-spring/**'
      - '.github/workflows/ci-api-spring.yaml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Copia o código do seu repositório para a máquina virtual do GitHub
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Configura o ambiente Java 21 (Temurin) na máquina virtual
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 3. Compila o código e roda os testes reais do Spring Boot
    - name: Build with Maven
      run: |
        cd api-spring
        mvn clean package -Dmaven.test.skip=true

    # 4. Faz o login automático no seu Docker Hub usando os Secrets criados
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 5. Configura o motor de Build do Docker (Buildx)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 6. Builda a imagem usando o seu Dockerfile e envia para o Docker Hub
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./api-spring
        file: ./api-spring/Dockerfile
        push: true
        # Substitua 'fabiomirandamonte' abaixo caso seu usuário do Docker Hub seja diferente
        tags: |
          fabiomirandamonte/api-spring:latest
          fabiomirandamonte/api-spring:${{ github.sha }}