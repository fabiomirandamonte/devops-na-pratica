apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-spring-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-spring
  template:
    metadata:
      labels:
        app: api-spring
    spec:
      containers:
      - name: api-spring
        image: fabiomirandamonte/api-spring:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "senha_secreta_123"
---
apiVersion: v1
kind: Service
metadata:
  name: api-spring-service
spec:
  type: NodePort
  selector:
    app: api-spring
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080